name: Build and publish dist

# Rebuild the runnable form on every push to main and commit it to the dedicated
# `dist` branch, so consumers install prebuilt files (zero on-arrival build).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-dist
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build
        run: pnpm build

      - name: Generate dist-branch package.json (root-relative)
        run: |
          node -e '
            const fs = require("fs");
            const src = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const out = {
              name: src.name,
              version: src.version,
              type: "module",
              description: src.description,
              license: src.license,
              sideEffects: ["**/*.css"],
              files: ["index.js", "index.d.ts", "style.css"],
              exports: {
                ".": { types: "./index.d.ts", import: "./index.js" },
                "./style.css": "./style.css"
              },
              peerDependencies: src.peerDependencies
            };
            fs.writeFileSync("dist/package.json", JSON.stringify(out, null, 2) + "\n");
          '

      - name: Publish to dist branch
        run: |
          set -euo pipefail

          # Stash the freshly built artifacts outside the work tree.
          staging="$(mktemp -d)"
          cp dist/index.js dist/index.d.ts dist/style.css dist/package.json "$staging/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Republish unconditionally: recreate `dist` as a single fresh commit
          # built from the current head, even when the output is byte-identical to
          # the previous publish. No diff check — saving the latest head's build is
          # this step's only job, and the commit always records the source SHA.
          git checkout --orphan dist-tmp
          git rm -rf . >/dev/null 2>&1 || true
          cp "$staging"/index.js "$staging"/index.d.ts "$staging"/style.css "$staging"/package.json .
          git add index.js index.d.ts style.css package.json
          git commit -m "build: publish dist from ${GITHUB_SHA:0:6}"
          git push --force origin dist-tmp:dist
